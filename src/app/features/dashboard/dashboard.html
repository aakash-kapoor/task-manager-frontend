<nav class="navbar">
  <h1>Trello Clone</h1>
  <button (click)="logout()" class="logout-btn">Log Out</button>
</nav>

<div class="dashboard-container">
  <div class="workspace-header">
    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
    <h2>Your Workspaces</h2>
  </div>

  <div class="board-grid">
    
    @for (board of boards; track board.id) {
      <a [routerLink]="['/board', board.id]" class="board-card">
        <h3>{{ board.title }}</h3>
        <span class="open-text">Open board &rarr;</span>
      </a>
    }

    <div class="create-board-card">
      <input 
        [(ngModel)]="newBoardTitle" 
        (keyup.enter)="createBoard()"
        placeholder="New board title..." 
        class="board-input"
      >
      <button 
        (click)="createBoard()" 
        [disabled]="!newBoardTitle.trim()"
        class="create-btn">
        Create Board
      </button>
    </div>

  </div>
</div>
