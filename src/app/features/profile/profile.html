<app-nav-bar [currentPage]="'profile'"></app-nav-bar>

<div class="profile-container">
  
  @if (user) {
    <div class="profile-card">
      <div class="avatar">{{ user.initials }}</div>
      <h2>{{ user.name }}</h2>
      <p class="email">{{ user.email }}</p>
      
      <div class="settings-section">
        <h3>Account Details</h3>
        
        <div class="setting-item">
          <label>Full Name</label>
          <input type="text" [value]="user.name" disabled>
        </div>
        
        <div class="setting-item">
          <label>Email Address</label>
          <input type="text" [value]="user.email" disabled>
        </div>

        <div class="setting-item">
          <label>Role</label>
          <input type="text" [value]="user.role" style="text-transform: capitalize;" disabled>
        </div>

        <div class="setting-item">
          <label>Member Since</label>
          <input type="text" [value]="user.createdAt | date:'longDate'" disabled>
        </div>
        
      </div>
    </div>
  } @else {
    <div style="margin-top: 50px; color: #5e6c84;">Loading profile data...</div>
  }

</div>
