<div class="min-h-screen flex items-center justify-center bg-blue-600">
  <div class="bg-white p-8 rounded-lg shadow-xl w-96">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Login to Trello</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" formControlName="email" class="w-full mt-1 p-2 border rounded focus:ring-blue-500 focus:border-blue-500">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" formControlName="password" class="w-full mt-1 p-2 border rounded focus:ring-blue-500 focus:border-blue-500">
      </div>
      
      <button type="submit" [disabled]="loginForm.invalid" class="w-full bg-blue-600 text-white py-2 rounded font-semibold hover:bg-blue-700 disabled:bg-gray-400">
        Sign In
      </button>
    </form>
  </div>
</div>
